  <style>
    /* ===== MODO CLARO ===== */
    :root {
      --canvas: #F5F0EB;
      --surface: #FFFFFF;
      --surface-hover: #F0EBE6;
      --surface-teal: #024653;
      --brand-primary: #CFF434;
      --brand-primary-hover: #dbf65a;
      --brand-success: #07D16E;
      --txt-primary: #171614;
      --txt-secondary: #6B6560;
      --txt-muted: #6E6E6E;
      --txt-on-accent: #171614;
      --border-subtle: #E0D6CE;
      --border-hover: #CFF434;
      --border-accent: #CFF434;
      --shadow-card: 0 1px 3px rgba(0,0,0,0.06);

      /* ===== MODO OSCURO ===== */
      --canvas-dark: #171614;
      --surface-dark: #2A2A2A;
      --surface-dark-hover: #333333;
      --txt-primary-dark: #EAF4F5;
      --txt-secondary-dark: #9CA3AF;
      --txt-muted-dark: #8B95A5;
      --border-subtle-dark: rgba(255,255,255,0.08);
      --border-hover-dark: rgba(207,244,52,0.3);
      --shadow-card-dark: 0 1px 3px rgba(0,0,0,0.3);

      /* Layout */
      --max-w: 72rem;
      --max-w-narrow: 48rem;
      --section-py: 5rem;
      --card-radius: 12px;
      --btn-radius: 999px;
    }
    @media (min-width: 768px) {
      :root { --section-py: 6rem; }
    }

    /* ===== FONT ===== */
    @font-face {
      font-family: 'Inter Variable';
      src: url('./assets/fonts/InterVariable.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    /* ===== RESET ===== */
    [x-cloak] { display: none !important; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; scroll-padding-top: 5rem; }
    body {
      background: var(--canvas);
      color: var(--txt-primary);
      font-family: 'Inter Variable', system-ui, -apple-system, 'Segoe UI', sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    img { max-width: 100%; height: auto; display: block; }

    /* ===== DUAL MODE SECTIONS ===== */
    .section-light {
      background: var(--canvas);
      color: var(--txt-primary);
    }
    .section-dark {
      background: var(--canvas-dark);
      color: var(--txt-primary-dark);
    }
    .section-dark .txt-secondary { color: var(--txt-secondary-dark); }
    .section-dark .txt-muted { color: var(--txt-muted-dark); }
    .section-dark .eyebrow { color: var(--txt-secondary-dark); }

    /* Gradient transition between modes */
    .section-transition {
      background: linear-gradient(
        180deg,
        #171614 0%,
        #171614 85%,
        #1A1816 92%,
        #D4CCC2 97%,
        #F5F0EB 100%
      );
      padding: 0;
      min-height: 4rem;
    }

    /* ===== UTILITIES ===== */
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 1.5rem; }
    .container-narrow { max-width: var(--max-w-narrow); margin: 0 auto; padding: 0 1.5rem; }
    .section { padding: var(--section-py) 0; position: relative; overflow: hidden; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    .sr-only.focus\:not-sr-only:focus { position: static; width: auto; height: auto; overflow: visible; clip: auto; white-space: normal; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .gap-2 { gap: 0.5rem; }
    .text-center { text-align: center; }

    /* ===== TYPOGRAPHY ===== */
    .display { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 700; line-height: 1.05; letter-spacing: -0.03em; }
    .h1 { font-size: clamp(1.75rem, 4vw, 3rem); font-weight: 700; line-height: 1.1; letter-spacing: -0.02em; }
    .h2 { font-size: clamp(1.25rem, 2.5vw, 1.75rem); font-weight: 600; line-height: 1.2; letter-spacing: -0.015em; }
    .h3 { font-size: 1.25rem; font-weight: 600; line-height: 1.3; }
    .body { font-size: clamp(1rem, 1.2vw, 1.125rem); line-height: 1.6; }
    .body-sm { font-size: 0.875rem; line-height: 1.5; }
    .caption { font-size: 0.75rem; font-weight: 500; line-height: 1.4; }
    .eyebrow { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--txt-secondary); margin-bottom: 1rem; }
    .txt-secondary { color: var(--txt-secondary); }
    .txt-muted { color: var(--txt-muted); }

    /* ===== TERMINAL VIVA ===== */
    .terminal-line {
      font-family: 'Courier New', Consolas, monospace;
      font-size: 0.7rem;
      line-height: 1.7;
      color: var(--brand-primary);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }
    .terminal-cursor {
      display: inline-block;
      width: 0.55rem;
      height: 1.1rem;
      background: var(--brand-primary);
      animation: blink 0.6s step-end infinite;
      vertical-align: text-bottom;
      opacity: 0.25;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* ===== FLOATING TECH CARDS 3D ===== */
    .float-card {
      position: absolute;
      pointer-events: none;
      user-select: none;
      z-index: 0;
      opacity: 0.07;
      font-size: 2.5rem;
      color: var(--brand-primary);
      perspective: 600px;
    }
    .float-card-inner {
      display: inline-block;
      transform-style: preserve-3d;
      animation: floatSway 12s ease-in-out infinite, cardTilt 10s ease-in-out infinite;
    }
    @keyframes floatSway {
      0%, 100% { transform: translateY(0px); }
      33% { transform: translateY(-18px); }
      66% { transform: translateY(-8px); }
    }
    @keyframes cardTilt {
      0%, 100% { transform: rotateY(0deg) rotateX(0deg); }
      25% { transform: rotateY(25deg) rotateX(5deg); }
      50% { transform: rotateY(-10deg) rotateX(-5deg); }
      75% { transform: rotateY(18deg) rotateX(-8deg); }
    }

    /* ===== FLOATING LIGHT SECTIONS (grandes, decorativos) ===== */
    .float-light {
      position: absolute;
      pointer-events: none;
      user-select: none;
      z-index: 0;
      opacity: 0.10;
      font-size: clamp(6rem, 14vw, 12rem);
      line-height: 1;
      color: var(--surface-teal);
      transform-origin: center center;
    }
    .float-light-inner {
      display: inline-block;
      animation: floatSway 16s ease-in-out infinite;
    }

    /* ========== NAV (DUAL GLASS) ========== */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; transition: background 0.3s ease, border-color 0.3s ease; }
    .nav.hero-mode { background: rgba(23,22,20,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(207,244,52,0.1); }
    .nav.light-mode { background: rgba(245,240,235,0.88); border-bottom: 1px solid rgba(2,70,83,0.12); }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 3.5rem; max-width: var(--max-w); margin: 0 auto; padding: 0 1.5rem; }
    .nav-links { display: none; gap: 0.25rem; }
    .nav.hero-mode .nav-links a { color: var(--txt-secondary-dark); }
    .nav.light-mode .nav-links a { color: var(--txt-secondary); }
    .nav-links a { padding: 0.5rem 0.75rem; font-size: 0.875rem; font-weight: 500; border-radius: 0.5rem; transition: color 0.2s; }
    .nav-links a:hover { color: var(--brand-primary) !important; }
    .nav-links a.active { color: var(--brand-primary) !important; font-weight: 600; }
    .nav-actions { display: flex; align-items: center; gap: 0.75rem; }
    .nav-logo-dark, .nav.hero-mode .nav-logo-dark, .nav.light-mode .nav-logo-dark { display: none; }

    @media (min-width: 768px) {
      .nav-links { display: flex; }
      button.nav-hamburger { display: none; }
    }
    .mobile-menu { position: fixed; inset: 0; top: 3.5rem; background: var(--surface); z-index: 99; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .mobile-menu a { padding: 1rem; font-size: 1.125rem; font-weight: 500; color: var(--txt-primary); border-radius: 0.75rem; }

    /* ========== COMPONENTS ========== */
    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--card-radius);
      padding: 1.5rem;
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-card);
    }
    .card-dark {
      background: var(--surface-dark);
      border: 1px solid var(--border-subtle-dark);
      border-radius: var(--card-radius);
      padding: 1.5rem;
      color: var(--txt-primary-dark);
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card-dark:hover {
      border-color: var(--border-hover-dark);
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(207,244,52,0.08);
    }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.5rem; border-radius: var(--btn-radius);
      font-size: 0.9375rem; font-weight: 600; line-height: 1;
      border: none; cursor: pointer; transition: all 0.15s ease;
      white-space: nowrap; min-height: 44px;
    }
    .btn-primary { background: var(--brand-primary); color: var(--txt-on-accent); }
    .btn-primary:hover { background: var(--brand-primary-hover); transform: scale(1.03); }
    .btn-outline-dark { background: transparent; color: var(--brand-primary); border: 1px solid rgba(207,244,52,0.3); }
    .btn-outline-dark:hover { border-color: var(--brand-primary); background: rgba(207,244,52,0.08); }
    .btn-outline-light { background: transparent; color: var(--txt-primary); border: 1px solid var(--border-subtle); }
    .btn-outline-light:hover { border-color: var(--brand-primary); color: var(--brand-primary); }
    .btn-ghost { background: transparent; color: var(--txt-secondary); padding: 0.5rem 0.75rem; }
    .btn-ghost:hover { color: var(--txt-primary); }

    /* Badges */
    .badge {
      display: inline-flex; padding: 0.25rem 0.75rem;
      background: var(--surface-teal); color: #EAF4F5;
      border-radius: 999px; font-size: 0.75rem; font-weight: 500;
    }
    .badge-lime { background: var(--brand-primary); color: var(--txt-on-accent); font-weight: 600; }
    .badge-green { background: var(--brand-success); color: #fff; }
    .badge-formato {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.2rem 0.6rem;
      border: 1px solid var(--border-hover-dark); color: var(--brand-primary);
      border-radius: 6px; font-size: 0.7rem; font-weight: 600;
    }

    /* Price card */
    .price-card {
      background: var(--surface-dark); border: 1px solid var(--border-subtle-dark);
      border-radius: 16px; padding: 2rem; transition: border-color 0.2s, transform 0.2s;
      color: var(--txt-primary-dark); position: relative;
    }
    .price-card:hover { transform: translateY(-2px); }
    .price-card.featured {
      border-color: var(--brand-primary);
      border-width: 2px;
      box-shadow: 0 0 40px rgba(207,244,52,0.15);
      transform: scale(1.07);
    }
    .price-card.featured:hover { transform: scale(1.07) translateY(-2px); }
    .price-card .price { font-size: 2.5rem; font-weight: 700; line-height: 1; }
    .price-card .price span { font-size: 1rem; font-weight: 400; color: var(--txt-muted-dark); }

    /* Grid */
    .grid { display: grid; gap: 1.5rem; }
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr; }
    @media (min-width: 640px) { .grid-2 { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 768px) { .grid-3 { grid-template-columns: repeat(3, 1fr); } }

    /* Step connector */
    .step { display: flex; gap: 1rem; align-items: flex-start; }
    .step-number { flex-shrink: 0; width: 2.5rem; height: 2.5rem; border-radius: 50%; background: var(--brand-primary); color: var(--txt-on-accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.125rem; }
    .step-line { width: 2px; flex-shrink: 0; background: var(--border-subtle); margin: 0 auto; min-height: 2rem; }

    /* FAQ */
    .faq-item { border-bottom: 1px solid var(--border-subtle); }
    .faq-question { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 0; background: none; border: none; cursor: pointer; font-size: 1rem; font-weight: 500; color: var(--txt-primary); text-align: left; min-height: 44px; }
    .faq-question:hover { color: var(--surface-teal); }
    .faq-answer { overflow: hidden; }
    .faq-answer-inner { padding-bottom: 1.25rem; color: var(--txt-secondary); line-height: 1.6; }

    /* Comparison table */
    .cmp-row { display: flex; border-bottom: 1px solid var(--border-subtle); }
    .cmp-row:last-child { border-bottom: none; }
    .cmp-cell { flex: 1; padding: 1rem 0.75rem; font-size: 0.875rem; }
    .cmp-cell:first-child { font-weight: 500; flex: 0 0 40%; }
    .cmp-cell.offline { color: var(--brand-success); font-weight: 600; }
    .cmp-cell.offline i { margin-right: 0.25rem; }

    /* Stack card flip */
    .stack-card {
      perspective: 600px; cursor: pointer;
    }
    .stack-inner {
      position: relative; width: 100%; height: 120px;
      transition: transform 0.4s ease-out; transform-style: preserve-3d;
    }
    .stack-card:hover .stack-inner, .stack-card.flipped .stack-inner { transform: rotateY(180deg); }
    .stack-front, .stack-back {
      position: absolute; inset: 0; backface-visibility: hidden;
      border-radius: var(--card-radius);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .stack-front {
      background: var(--surface); border: 1px solid var(--border-subtle);
      flex-direction: column; gap: 0.5rem;
      color: var(--txt-primary);
    }
    .stack-back {
      background: var(--surface-dark); border: 1px solid var(--border-hover-dark);
      transform: rotateY(180deg);
      font-family: 'Courier New', Consolas, monospace;
      font-size: 0.65rem; color: var(--brand-primary);
      text-align: left; word-break: break-all;
    }

    /* ========== TECH GRID ========== */
    .tech-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(2, 1fr);
    }
    @media (min-width: 640px) {
      .tech-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
    .tech-grid .stack-inner {
      height: 140px;
    }
    .tech-grid .stack-front {
      background: linear-gradient(135deg, var(--surface-dark) 0%, var(--surface-dark-hover) 100%);
      border: 1px solid rgba(207,244,52,0.15);
    }
    .tech-grid .stack-card:hover .stack-front {
      border-color: var(--brand-primary);
      box-shadow: 0 0 24px rgba(207,244,52,0.12);
    }
    .tech-grid .stack-back {
      background: linear-gradient(135deg, #024653 0%, var(--canvas-dark) 100%);
      border: 1px solid var(--brand-primary);
      font-size: 0.7rem;
    }
    .tech-grid .stack-front i {
      font-size: 2.5rem;
      color: var(--brand-primary);
    }
    .tech-grid .stack-front .body-sm {
      color: var(--brand-primary);
    }

    /* CTA final pulse */
    .btn-cta-final {
      background: var(--brand-primary); color: var(--txt-on-accent);
      font-weight: 700; padding: 1rem 2.5rem; border-radius: 999px;
      font-size: 1.125rem; border: none; cursor: pointer;
      animation: pulse-cta 4s ease-in-out infinite;
    }
    @keyframes pulse-cta {
      0%, 100% { box-shadow: 0 0 0 0 rgba(207,244,52,0.4); }
      50% { box-shadow: 0 0 0 12px rgba(207,244,52,0); }
    }

    /* Stats counter */
    .stat-number { font-size: 2.5rem; font-weight: 700; color: var(--brand-primary); line-height: 1; }
    .stat-label { font-size: 0.875rem; color: var(--txt-secondary-dark); margin-top: 0.25rem; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .modal-content { background: var(--surface); border-radius: 16px; padding: 2rem; max-width: 28rem; width: 100%; position: relative; max-height: 80vh; overflow-y: auto; }

    /* ========== ANIMATIONS ========== */
    .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.6s cubic-bezier(0.16,1,0.3,1), transform 0.6s cubic-bezier(0.16,1,0.3,1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .delay-1 { transition-delay: 100ms; }
    .delay-2 { transition-delay: 200ms; }
    .delay-3 { transition-delay: 300ms; }
    .delay-4 { transition-delay: 400ms; }
    .delay-5 { transition-delay: 500ms; }
    .delay-6 { transition-delay: 600ms; }

    /* Section stagger for children */
    .stagger > *:nth-child(1) { transition-delay: 0ms; }
    .stagger > *:nth-child(2) { transition-delay: 100ms; }
    .stagger > *:nth-child(3) { transition-delay: 200ms; }
    .stagger > *:nth-child(4) { transition-delay: 300ms; }

    /* Hero fade-in sequence */
    .hero-fade { opacity: 0; transform: translateY(20px); animation: heroFadeIn 0.6s ease-out forwards; }
    .hero-fade-1 { animation-delay: 0.2s; }
    .hero-fade-2 { animation-delay: 0.4s; }
    .hero-fade-3 { animation-delay: 0.6s; }
    .hero-fade-4 { animation-delay: 0.8s; }
    @keyframes heroFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
      .reveal.visible { opacity: 1; transform: none; }
      .hero-fade { opacity: 1; transform: none; animation: none; }
      .btn-cta-final { animation: none; }
      .stack-inner { transition: none; }
      .stack-card:hover .stack-inner { transform: none; }
      .terminal-cursor { animation: none; }
      .float-card, .float-card-inner { animation: none !important; }
      .float-light, .float-light-inner { animation: none !important; }
      html { scroll-behavior: auto; }
    }

    /* ========== HERO DARK ========== */
    .hero-dark {
      min-height: 90dvh; display: flex; align-items: center;
      position: relative; overflow: hidden;
      background: var(--canvas-dark);
    }
    .hero-dark .display { color: #fff; }
    .hero-dark .hero-sub { color: var(--txt-secondary-dark); font-size: 1.25rem; max-width: 36rem; margin: 0 auto 0.5rem; }

    /* Mockup SVG placeholder in hero */
    .hero-mockup {
      width: 220px; height: 320px;
      border: 1px solid rgba(207,244,52,0.15);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      position: relative;
      overflow: hidden;
    }
    .hero-mockup .mockup-screen {
      position: absolute; inset: 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      display: flex; flex-direction: column; padding: 0.75rem;
      gap: 0.5rem;
    }
    .hero-mockup .mockup-row {
      height: 8px; border-radius: 4px;
      background: rgba(207,244,52,0.12);
    }
    .hero-mockup .mockup-row:nth-child(1) { width: 70%; }
    .hero-mockup .mockup-row:nth-child(2) { width: 50%; }
    .hero-mockup .mockup-row:nth-child(3) { width: 85%; }
    .hero-mockup .mockup-row:nth-child(4) { width: 45%; }
    .hero-mockup .mockup-row:nth-child(5) { width: 60%; }
    .hero-mockup .mockup-block {
      height: 40px; border-radius: 6px;
      background: rgba(207,244,52,0.08);
      margin-top: 0.5rem;
    }

    /* ========== APPS GRID ========== */
    .apps-grid {
