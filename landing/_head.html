<!DOCTYPE html>
<html lang="es" x-data="{ lang: localStorage.getItem('lang') || 'es', mobileOpen: false, scrolled: false, activeModal: null, faqOpen: null }" :class="{ 'lang-en': lang === 'en' }" x-init="window.addEventListener('scroll', () => scrolled = window.scrollY > 50)" x-cloak>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AHAguilera — Apps Offline-First | Desarrollo Freelance</title>
  <meta name="description" content="Desarrollo de apps offline-first sin servidores, sin CDNs. Alpine.js + Dexie + Tailwind. Tus datos, tu control.">
  <meta name="keywords" content="offline-first, apps, Alpine.js, Dexie, Tailwind, freelance, desarrollo web">
  <meta property="og:title" content="AHAguilera — Apps que funcionan sin internet">
  <meta property="og:description" content="Apps offline-first para Mipymes y freelancers. Sin servidores. Sin complicaciones.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_MX">
  <meta property="og:locale:alternate" content="en_US">
  <link rel="icon" href="./brand/logo-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/css/bootstrap-icons.css">

  <style>
    /* ========== VARIABLES ========== */
    :root {
      --canvas: #EAF4F5;
      --surface: #FFFFFF;
      --surface-hover: #f7fbfb;
      --surface-teal: #024653;
      --brand-primary: #CFF434;
      --brand-primary-hover: #dbf65a;
      --brand-secondary: #07D16E;
      --txt-primary: #171614;
      --txt-secondary: #5a6a6b;
      --txt-muted: #8a9a9b;
      --txt-on-accent: #171614;
      --border-subtle: #d0dbdc;
      --border-hover: #CFF434;
      --border-accent: #CFF434;
      --shadow-card: 0 1px 3px rgba(0,0,0,0.06);

      /* Layout */
      --max-w: 72rem;
      --max-w-narrow: 48rem;
      --section-py: 5rem;
      --section-py-lg: 8rem;
      --card-radius: 12px;
      --btn-radius: 999px;
    }

    @media (min-width: 768px) {
      :root { --section-py: 6rem; --section-py-lg: 8rem; }
    }

    /* ========== FONT ========== */
    @font-face {
      font-family: 'Inter Variable';
      src: url('./assets/fonts/InterVariable.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    /* ========== RESET ========== */
    [x-cloak] { display: none !important; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; scroll-padding-top: 5rem; }
    body {
      background: var(--canvas);
      color: var(--txt-primary);
      font-family: 'Inter Variable', system-ui, -apple-system, 'Segoe UI', sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    img { max-width: 100%; height: auto; display: block; }

    /* ========== UTILITIES ========== */
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 1.5rem; }
    .container-narrow { max-width: var(--max-w-narrow); margin: 0 auto; padding: 0 1.5rem; }
    .section { padding: var(--section-py) 0; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    .sr-only.focus\:not-sr-only:focus { position: static; width: auto; height: auto; overflow: visible; clip: auto; white-space: normal; }

    /* Typography */
    .display { font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 700; line-height: 1.05; letter-spacing: -0.025em; }
    .h1 { font-size: 2.5rem; font-weight: 700; line-height: 1.1; letter-spacing: -0.02em; }
    .h2 { font-size: 1.75rem; font-weight: 600; line-height: 1.2; letter-spacing: -0.015em; }
    .h3 { font-size: 1.25rem; font-weight: 600; line-height: 1.3; }
    .body { font-size: 1rem; line-height: 1.6; }
    .body-sm { font-size: 0.875rem; line-height: 1.5; }
    .caption { font-size: 0.75rem; font-weight: 500; line-height: 1.4; }
    .eyebrow { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--txt-secondary); margin-bottom: 1rem; }
    .txt-secondary { color: var(--txt-secondary); }
    .txt-muted { color: var(--txt-muted); }
    .text-center { text-align: center; }

    /* Code pattern background */
    .code-pattern {
      position: relative;
    }
    .code-pattern::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(207,244,52,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(207,244,52,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .code-pattern > * { position: relative; z-index: 1; }

    /* ========== ANIMATIONS ========== */
    .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.6s cubic-bezier(0.16,1,0.3,1), transform 0.6s cubic-bezier(0.16,1,0.3,1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .delay-1 { transition-delay: 100ms; }
    .delay-2 { transition-delay: 200ms; }
    .delay-3 { transition-delay: 300ms; }
    .delay-4 { transition-delay: 400ms; }
    .delay-5 { transition-delay: 500ms; }

    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
      .reveal.visible { opacity: 1; transform: none; }
      html { scroll-behavior: auto; }
    }

    /* ========== NAV ========== */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; transition: background 0.3s, box-shadow 0.3s; }
    .nav-scrolled { background: rgba(234,244,245,0.88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); box-shadow: 0 1px 0 var(--border-subtle); }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 3.5rem; max-width: var(--max-w); margin: 0 auto; padding: 0 1.5rem; }
    .nav-links { display: none; gap: 0.25rem; }
    .nav-links a { padding: 0.5rem 0.75rem; font-size: 0.875rem; font-weight: 500; color: var(--txt-secondary); border-radius: 0.5rem; transition: color 0.2s, background 0.2s; }
    .nav-links a:hover { color: var(--brand-primary); background: rgba(207,244,52,0.08); }
    .nav-links a.active { color: var(--txt-primary); }
    .nav-actions { display: flex; align-items: center; gap: 0.75rem; }

    @media (min-width: 768px) {
      .nav-links { display: flex; }
      .nav-hamburger { display: none; }
    }

    /* Mobile menu */
    .mobile-menu { position: fixed; inset: 0; top: 3.5rem; background: var(--surface); z-index: 99; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .mobile-menu a { padding: 1rem; font-size: 1.125rem; font-weight: 500; color: var(--txt-primary); border-radius: 0.75rem; transition: background 0.2s; }
    .mobile-menu a:hover { background: rgba(207,244,52,0.08); }

    /* ========== COMPONENTS ========== */
    .card {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--card-radius);
      padding: 1.5rem;
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      border-color: var(--brand-primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow-card);
    }

    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.5rem; border-radius: var(--btn-radius);
      font-size: 0.9375rem; font-weight: 600; line-height: 1;
      border: none; cursor: pointer; transition: all 0.15s ease;
      white-space: nowrap; min-height: 44px;
    }
    .btn-primary { background: var(--brand-primary); color: var(--txt-on-accent); }
    .btn-primary:hover { background: var(--brand-primary-hover); transform: scale(1.02); }
    .btn-outline { background: transparent; color: var(--txt-primary); border: 1px solid var(--border-subtle); }
    .btn-outline:hover { border-color: var(--brand-primary); color: var(--brand-primary); }
    .btn-ghost { background: transparent; color: var(--txt-secondary); padding: 0.5rem 0.75rem; }
    .btn-ghost:hover { color: var(--txt-primary); }

    .badge {
      display: inline-flex; padding: 0.25rem 0.75rem;
      background: var(--surface-teal); color: #EAF4F5;
      border-radius: 999px; font-size: 0.75rem; font-weight: 500;
    }
    .badge-lime { background: var(--brand-primary); color: var(--txt-on-accent); }
    .badge-green { background: var(--brand-secondary); color: #fff; }

    /* Price card */
    .price-card {
      background: var(--surface); border: 1px solid var(--border-subtle);
      border-radius: 16px; padding: 2rem; transition: border-color 0.2s;
    }
    .price-card.featured {
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 1px var(--brand-primary);
    }
    .price-card .price { font-size: 2.5rem; font-weight: 700; line-height: 1; }
    .price-card .price span { font-size: 1rem; font-weight: 400; color: var(--txt-secondary); }

    /* Grid */
    .grid { display: grid; gap: 1.5rem; }
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr; }
    @media (min-width: 640px) { .grid-2 { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 768px) { .grid-3 { grid-template-columns: repeat(3, 1fr); } }

    /* Step connector */
    .step { display: flex; gap: 1rem; align-items: flex-start; }
    .step-number { flex-shrink: 0; width: 2.5rem; height: 2.5rem; border-radius: 50%; background: var(--brand-primary); color: var(--txt-on-accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.125rem; }
    .step-line { width: 2px; flex-shrink: 0; background: var(--border-subtle); margin: 0 auto; min-height: 2rem; }

    /* FAQ */
    .faq-item { border-bottom: 1px solid var(--border-subtle); }
    .faq-question { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 0; background: none; border: none; cursor: pointer; font-size: 1rem; font-weight: 500; color: var(--txt-primary); text-align: left; min-height: 44px; }
    .faq-question:hover { color: var(--brand-primary); }
    .faq-answer { overflow: hidden; }
    .faq-answer-inner { padding-bottom: 1.25rem; color: var(--txt-secondary); line-height: 1.6; }

    /* Comparison table */
    .cmp-row { display: flex; border-bottom: 1px solid var(--border-subtle); }
    .cmp-row:last-child { border-bottom: none; }
    .cmp-cell { flex: 1; padding: 1rem 0.75rem; font-size: 0.875rem; }
    .cmp-cell:first-child { font-weight: 500; flex: 0 0 40%; }
    .cmp-cell.offline { color: var(--brand-secondary); font-weight: 600; }
    .cmp-cell.offline i { margin-right: 0.25rem; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .modal-content { background: var(--surface); border-radius: 16px; padding: 2rem; max-width: 28rem; width: 100%; position: relative; max-height: 80vh; overflow-y: auto; }

    /* Code syntax pattern */
    .code-grid-bg {
      background-image:
        linear-gradient(rgba(207,244,52,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(207,244,52,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ========== HERO ========== */
    .hero { min-height: 85dvh; display: flex; align-items: center; position: relative; overflow: hidden; }
    .hero-grid {
      background-image:
        linear-gradient(rgba(207,244,52,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(207,244,52,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ========== RESPONSIVE ========== */
    @media (min-width: 640px) {
      .grid-2 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 768px) {
      .grid-3 { grid-template-columns: repeat(3, 1fr); }
      .grid-4 { grid-template-columns: repeat(4, 1fr); }
      .cmp-cell { padding: 1rem 1.5rem; }
      .cmp-cell:first-child { flex: 0 0 30%; }
    }
    @media (min-width: 1024px) {
      .grid-4 { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
